<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AfroDocs LinkedIn Banner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #B0BCCC;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 60px 40px;
    gap: 16px;
    font-family: 'Outfit', sans-serif;
  }

  .size-note {
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  /* NOTE: On LinkedIn, profile picture covers bottom-left ~200px.
     All key content is pushed right of center. */

  .banner {
    width: 1584px;
    height: 396px;
    background: #FFFFFF;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* ─── BACKGROUND ─── */
  .bg-dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(29,78,216,0.06) 1px, transparent 1px);
    background-size: 28px 28px;
    z-index: 0;
  }

  /* ─── LEFT navy anchor block ─── */
  .slab-navy {
    position: absolute;
    left: 0; top: 0;
    width: 380px; height: 100%;
    background: #0B1628;
    clip-path: polygon(0 0, 86% 0, 68% 100%, 0 100%);
    z-index: 2;
  }

  /* ─── Cascading wedges — left to right ─── */
  .w1 {
    position: absolute;
    left: 258px; top: 0;
    width: 170px; height: 100%;
    background: #1538A8;
    clip-path: polygon(32% 0, 100% 0, 68% 100%, 0 100%);
    z-index: 3;
  }
  .w2 {
    position: absolute;
    left: 320px; top: 0;
    width: 140px; height: 100%;
    background: #1D4ED8;
    clip-path: polygon(34% 0, 100% 0, 66% 100%, 0 100%);
    z-index: 4;
  }
  .w3 {
    position: absolute;
    left: 374px; top: 0;
    width: 110px; height: 100%;
    background: #3B82F6;
    clip-path: polygon(36% 0, 100% 0, 64% 100%, 0 100%);
    z-index: 5;
    opacity: 0.75;
  }
  .w4 {
    position: absolute;
    left: 414px; top: 0;
    width: 80px; height: 100%;
    background: #93C5FD;
    clip-path: polygon(36% 0, 100% 0, 64% 100%, 0 100%);
    z-index: 6;
    opacity: 0.5;
  }
  .w5 {
    position: absolute;
    left: 444px; top: 0;
    width: 60px; height: 100%;
    background: #BFDBFE;
    clip-path: polygon(36% 0, 100% 0, 64% 100%, 0 100%);
    z-index: 7;
    opacity: 0.45;
  }

  /* ─── RIGHT geometric shapes ─── */
  .shape-right-navy {
    position: absolute;
    right: 0; top: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 396px 280px 0 0;
    border-color: #0B1628 transparent transparent transparent;
    z-index: 2;
  }

  .shape-right-royal {
    position: absolute;
    right: 0; top: 0;
    width: 340px; height: 100%;
    background: #1D4ED8;
    clip-path: polygon(24% 0, 100% 0, 100% 100%, 0 100%);
    z-index: 3;
  }

  .shape-right-bright {
    position: absolute;
    right: 240px; top: 0;
    width: 130px; height: 100%;
    background: #2563EB;
    clip-path: polygon(32% 0, 100% 0, 68% 100%, 0 100%);
    z-index: 4;
    opacity: 0.6;
  }

  /* Ring on right blue area */
  .ring {
    position: absolute;
    right: 60px; top: 50%;
    transform: translateY(-50%);
    width: 200px; height: 200px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.18);
    z-index: 10;
  }
  .ring-sm {
    position: absolute;
    right: 110px; top: 50%;
    transform: translateY(-50%);
    width: 100px; height: 100px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.13);
    z-index: 10;
  }

  /* Small diamond accent */
  .diamond {
    position: absolute;
    left: 170px; top: -16px;
    width: 48px; height: 48px;
    background: #1D4ED8;
    transform: rotate(45deg);
    border-radius: 5px;
    z-index: 8;
  }
  .diamond-sm {
    position: absolute;
    left: 302px; bottom: -14px;
    width: 34px; height: 34px;
    background: #3B82F6;
    transform: rotate(45deg);
    border-radius: 4px;
    z-index: 8;
    opacity: 0.8;
  }

  /* ─── FOOTER BAR ─── */
  .footer-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 46px;
    background: #F0F6FF;
    border-top: 1.5px solid #DBEAFE;
    z-index: 20;
    display: flex;
    align-items: center;
    padding: 0 52px 0 400px;
    gap: 48px;
  }

  .f-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 500;
    color: #1E3A6E;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .f-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #1D4ED8;
    flex-shrink: 0;
  }

  /* ══════════════════════════════
     LOGO — sits on navy left slab
  ══════════════════════════════ */
  .logo-block {
    position: absolute;
    left: 0; top: 0;
    width: 360px;
    height: calc(100% - 46px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    z-index: 20;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .wordmark {
    font-weight: 900;
    font-size: 32px;
    color: #fff;
    letter-spacing: 4px;
    line-height: 1;
  }

  .logo-tagline {
    font-size: 9.5px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 400;
    text-align: center;
  }

  /* ══════════════════════════════
     MAIN CONTENT — pushed right of center
     (safe from LinkedIn profile pic)
  ══════════════════════════════ */
  .content-block {
    position: absolute;
    left: 500px;          /* well clear of left slab + wedges */
    right: 370px;         /* well clear of right blue block */
    top: 0;
    height: calc(100% - 46px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 14px;
    z-index: 20;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 0;
    width: fit-content;
  }

  .eyebrow-text {
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: #1D4ED8;
    padding: 5px 14px;
    border-radius: 3px 0 0 3px;
  }

  .eyebrow-tail {
    width: 0; height: 0;
    border-style: solid;
    border-width: 26px 0 0 14px;
    border-color: transparent transparent transparent #1D4ED8;
  }

  .headline {
    font-weight: 900;
    font-size: 58px;
    color: #0B1628;
    line-height: 1.05;
    letter-spacing: -0.025em;
  }

  .headline .blue {
    color: #1D4ED8;
    font-style: italic;
  }

  .sub-text {
    font-size: 14px;
    font-weight: 400;
    color: #475569;
    line-height: 1.5;
    max-width: 420px;
  }

  /* ══════════════════════════════
     RIGHT CONTENT — over blue area
  ══════════════════════════════ */
  .right-block {
    position: absolute;
    right: 18px;
    top: 0;
    width: 320px;
    height: calc(100% - 46px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    z-index: 20;
  }

  .url-pill {
    font-size: 14px;
    font-weight: 700;
    color: #1D4ED8;
    background: #fff;
    padding: 10px 28px;
    border-radius: 40px;
    letter-spacing: 0.05em;
    white-space: nowrap;
    box-shadow: 0 4px 18px rgba(0,0,0,0.15);
  }

  .right-label {
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    text-align: center;
  }
</style>
</head>
<body>

<p class="size-note">LinkedIn Banner · 1584 × 396</p>

<div class="banner">

  <div class="bg-dots"></div>

  <!-- LEFT SHAPES -->
  <div class="slab-navy"></div>
  <div class="w1"></div>
  <div class="w2"></div>
  <div class="w3"></div>
  <div class="w4"></div>
  <div class="w5"></div>
  <div class="diamond"></div>
  <div class="diamond-sm"></div>

  <!-- RIGHT SHAPES -->
  <div class="shape-right-navy"></div>
  <div class="shape-right-royal"></div>
  <div class="shape-right-bright"></div>
  <div class="ring"></div>
  <div class="ring-sm"></div>

  <!-- FOOTER -->
  <div class="footer-bar">
    <div class="f-item"><div class="f-dot"></div> www.afrodocs.app</div>
    <div class="f-item"><div class="f-dot"></div> +237 671 308 991</div>
    <div class="f-item"><div class="f-dot"></div> Instant &nbsp;·&nbsp; Automatic &nbsp;·&nbsp; Effortless</div>
  </div>

  <!-- LOGO -->
  <div class="logo-block">
    <div class="logo-row">
      <svg width="48" height="48" viewBox="0 0 300 220" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gL" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#3B82F6"/>
            <stop offset="100%" stop-color="#1D4ED8"/>
          </linearGradient>
          <linearGradient id="gR" x1="1" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#60A5FA"/>
            <stop offset="100%" stop-color="#2563EB"/>
          </linearGradient>
          <linearGradient id="gBolt" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="100%" stop-color="#BFDBFE"/>
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <polygon points="72,148 112,30 132,30 102,148" fill="url(#gL)"/>
        <polygon points="228,148 188,30 168,30 198,148" fill="url(#gR)"/>
        <polygon points="102,100 120,100 113,118 95,118" fill="url(#gL)" opacity="0.85"/>
        <polygon points="198,100 180,100 187,118 205,118" fill="url(#gR)" opacity="0.85"/>
        <g filter="url(#glow)">
          <path d="M150 38 L132 82 L144 82 L130 122 L168 72 L154 72 L168 38 Z" fill="url(#gBolt)"/>
        </g>
      </svg>
      <div class="wordmark">AFRODOCS</div>
    </div>
    <div class="logo-tagline">Automatic Document Formatter</div>
  </div>

  <!-- MAIN HEADLINE & TEXT -->
  <div class="content-block">
    <div class="eyebrow">
      <span class="eyebrow-text">Document Formatting</span>
      <div class="eyebrow-tail"></div>
    </div>
    <div class="headline">
      Format Smarter,<br>
      <span class="blue">Work Faster</span>
    </div>
    <div class="sub-text">
      APA styles, reports, academic papers and table of contents — automated in seconds
    </div>
  </div>

  <!-- RIGHT URL -->
  <div class="right-block">
    <div class="url-pill">afrodocs.app</div>
    <div class="right-label">Get Started Free</div>
  </div>

</div>

</body>
</html>
